<!DOCTYPE html>

user-scalable=no">

    <style>
        body {
            color: white;
            background-color: black;
        }

        .body {
            background: url(images/background.jpg) no-repeat center center fixed;
            background-size: cover;
            display: table;
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            filter: blur(6px);
        }

        .outer {
            display: table;

            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
        }

        .middle {
            display: table-cell;
            vertical-align: middle;
        }

        .inner {
            margin-left: auto;
            margin-right: auto;
            width: 50%;
            min-width: 450px;
            border-radius: 25px;
            padding: 10px;
            background-color: rgba(100,100,100,0.4);
        }

        .center {
            margin-left: auto;
            margin-right: auto;
            width: 196px;
            height: 196px;
        }

        .logos {
            background: rgb(0, 0, 0, 0.5);
            border-radius: 25px;
            width: fit-content;
            padding: 15px;
            margin-left: auto;
            margin-right: auto;
            margin-bottom: 30px;
            color: transparent;
        }

        img {
            height: 64px;
            margin: 15px 20px 15px 20px;
        }
    </style>
</head>
